<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tek Renk Teması: Çarpıcı ve Premium Kırmızı -->
    <linearGradient id="themeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1744" /> <!-- Canlı parlak kırmızı -->
      <stop offset="100%" stop-color="#B71C1C" /> <!-- Derin koyu kırmızı -->
    </linearGradient>

    <!-- İç kadran siyahı (Derinlik hissi) -->
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E0000" />
      <stop offset="100%" stop-color="#140000" />
    </linearGradient>
  </defs>

  <!-- GÖVDE (Büyütülmüş Dinamik Gösterge - Alana Tam Sığar) -->
  <!-- Tüm rüzgar/hız şeritleri tasarımdan çıkarıldı, ana çember r=60 ile büyütüldü -->
  <circle cx="64" cy="64" r="60" fill="url(#themeGrad)" />
  
  <!-- İÇ KADRAN (Büyütülmüş oranla r=50) -->
  <circle cx="64" cy="64" r="50" fill="url(#faceGrad)" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2" />

  <!-- İLERLEYEN ZAMAN / SÜRE VURGUSU (Orantılı Büyütüldü) -->
  <!-- 50px yarıçapında zaman çizelgesi yörüngesi -->
  <path d="M 64 14 A 50 50 0 0 1 107 89" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="7" 
        stroke-linecap="round" />
  <!-- İlerleme çizgisinin ucu -->
  <circle cx="107" cy="89" r="6" fill="#FFFFFF" />

  <!-- HIZ İKONU (>> İleri Sarma) - Büyütülmüş ve Tam Ortalanmış -->
  <g transform="translate(41, 42)">
     <path d="M0,0 L24,22 L0,44 Z" fill="#FFFFFF" />
     <path d="M22,0 L46,22 L22,44 Z" fill="#FFFFFF" />
  </g>
</svg>
